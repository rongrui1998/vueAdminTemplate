name: front-v3-ci

on:
  push:
    paths:
      - 'front/V3/**'
      - '.github/workflows/front-v3-ci.yml'
  pull_request:
    paths:
      - 'front/V3/**'
      - '.github/workflows/front-v3-ci.yml'

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front/V3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: front/V3/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Stylelint
        run: pnpm stylelint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
